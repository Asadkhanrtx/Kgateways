apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fitness-app-route
  namespace: gateway-ns
spec:
  parentRefs:
    - name: asad-gateway
      namespace: gateway-ns
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /fitness
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: fitness-app-service
          port: 80
